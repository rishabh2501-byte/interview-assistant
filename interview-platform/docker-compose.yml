version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: interview_db
    environment:
      POSTGRES_DB: interview_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/migrations/001_session_quotas.sql:/docker-entrypoint-initdb.d/02-migration1.sql
      - ./backend/migrations/002_email_verification.sql:/docker-entrypoint-initdb.d/03-migration2.sql
      - ./backend/seed.sql:/docker-entrypoint-initdb.d/04-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d interview_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interview_backend
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: interview_platform
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: interview_platform_super_secret_jwt_key_2024
      JWT_EXPIRES_IN: 7d
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_placeholder}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-placeholder_secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FRONTEND_URL: http://localhost:5173
      UPLOAD_DIR: uploads
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interview_frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
